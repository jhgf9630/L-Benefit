<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>L-Benefit</title>
    <link rel="stylesheet" href="../leaflet/leaflet.css" />
    <link rel="stylesheet" href="../leaflet/markercluster/MarkerCluster.css" />
    <link rel="stylesheet" href="../leaflet/markercluster/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

    <!-- 검색 + 카테고리 필터 (상단 중앙) -->
    <div id="controls">
        <div id="searchWrapper">
            <input type="text" id="searchInput" placeholder="기관명 검색...">
            <button id="searchClear" title="지우기">✕</button>
        </div>
        <select id="categoryFilter">
            <option value="all">전체 카테고리</option>
            <option value="office">회사</option>
            <option value="hotel">호텔</option>
            <option value="restaurant">식당</option>
            <option value="etc">기타</option>
        </select>
    </div>

    <!-- 동기화 상태 + 재연동 버튼 (좌하단 고정) -->
    <div id="syncStatusBar">
        <span id="syncStatus" class="sync-status sync-neutral">데이터 확인 중...</span>
        <button id="slmReconnectBtn" class="slm-reconnect-btn">데이터 동기화</button>
    </div>

    <div id="map"></div>

    <!-- 국내 제휴 리스트 (해외 버튼 바로 위) -->
    <div id="domestic-container">
        <button id="domestic-btn">🗺️ 국내 제휴 리스트 보기</button>
        <div id="domestic-popup" class="hidden">
            <div class="popup-header">
                <h4>🗺️ 국내 제휴 리스트</h4>
                <button id="close-domestic-popup">×</button>
            </div>
            <ul id="domesticList"></ul>
        </div>
    </div>

    <!-- 해외 제휴 리스트 (우하단) -->
    <div id="overseas-container">
        <button id="overseas-btn">✈️ 해외 제휴 리스트 보기</button>
        <div id="overseas-popup" class="hidden">
            <div class="popup-header">
                <h4>✈️ 해외 제휴 리스트</h4>
                <button id="close-popup">×</button>
            </div>
            <ul id="overseasList"></ul>
        </div>
    </div>

    <script src="../leaflet/leaflet.js"></script>
    <script src="../leaflet/markercluster/leaflet.markercluster.js"></script>
    <script src="./js/sync.js"></script>
    <script src="./js/app.js"></script>

</body>
</html>
